exclude: '(README\.md|CONTRIBUTING\.md)$'
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: detect-private-key
    -   id: requirements-txt-fixer


repos:
  # Black: Auto-formats Python code
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black

  # isort: Sorts imports alphabetically
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1  
    hooks:
      - id: isort
        args: [--profile=black]  # Compatible with Black

  # Flake8: Lints for style and errors (PEP 8 compliance)
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0  # Latest stable
    hooks:
      - id: flake8
        args: [--max-line-length=88, --ignore=E203]  # Compatible with Black
        exclude: ^.*/tests/
        additional_dependencies: [flake8-black, flake8-isort]  # Optional: Integrate with Black/isort

  # Mypy: Static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2  # Latest stable
    hooks:
      - id: mypy

  # Autoflake: Removes unused imports and variables
  - repo: https://github.com/pycqa/autoflake
    rev: v2.3.1  # Latest stable
    hooks:
      - id: autoflake
        args: [--in-place, --remove-all-unused-imports, --remove-unused-variables, --expand-star-imports]

  # Pyupgrade: Upgrades syntax to newer Python versions
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0  # Latest stable
    hooks:
      - id: pyupgrade

  # Detect-secrets: Scans for secrets (API keys, passwords)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0  # Latest stable
    hooks:
      - id: detect-secrets
        exclude: ^.*/tests/

  # Bandit: Security linter for Python code
  - repo: https://github.com/PyCQA/bandit/
    rev: 1.8.6  # Latest stable
    hooks:
      - id: bandit
        exclude: ^.*/tests/  # Optional: Skip tests
