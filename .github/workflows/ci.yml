name: CI Pipeline with Pre-commit and Pytest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-and-testing:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up a specific Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 3. Install project dependencies (for tests)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run all pre-commit hooks on all files
      #    This ensures that even if a developer skips hooks locally,
      #    the CI pipeline will catch any issues.
      - name: Run pre-commit hooks
        run: |
          pip install pre-commit
          pre-commit run --files starter-code-simple/*

      # 5. Run the test suite (e.g., with pytest)
      #    Tests are typically not run in pre-commit hooks due to speed,
      #    so the CI pipeline is the perfect place for them.
      - name: Run tests with pytest
        run: |
          pip install pytest
          pytest